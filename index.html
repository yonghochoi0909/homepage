<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작품 제목 2 | 환영합니다</title>
  <meta name="description" content="작품 제목 2 본문" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
      line-height: 1.9;
    }
    a { color: inherit; text-decoration: none; }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px;
    }
    header {
      padding: 28px 0;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(248, 250, 252, 0.95);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }
    .back-link {
      display: inline-flex;
      font-size: 14px;
      color: #4b5563;
      border-bottom: 1px solid #cbd5e1;
    }
    main {
      padding: 56px 0 72px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }
    .meta {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 32px;
    }
    .story {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      white-space: pre-line;
      font-size: 17px;
    }
    @media (max-width: 860px) {
      h1 { font-size: 32px; }
      .story { padding: 22px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <a class="back-link" href="../index.html">홈으로 돌아가기</a>

  <main>
    <div class="wrap">
      <h1>작품 제목 2</h1>

여기에 두 번째 소설 본문을 붙여 넣으세요.

이 페이지도 같은 방식으로 길게 읽히도록 구성했습니다.
      </div>
    </div>
  </main>
</body>
</html>
